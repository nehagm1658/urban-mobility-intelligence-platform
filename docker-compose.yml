version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://umip_admin:umip_password@postgres:5432/airflow_meta
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Lets orchestrator.py (running inside the Airflow container via
    # BashOperator) reach this same Postgres service by its Docker network
    # hostname, same variables config.py already reads via os.environ.
    UMIP_PG_HOST: postgres
    UMIP_PG_PORT: "5432"
    UMIP_PG_DB: umip_platform
    UMIP_PG_USER: umip_admin
    UMIP_PG_PASSWORD: umip_password
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - .:/opt/airflow/project   # whole project mounted so orchestrator.py + pipelines/ are reachable
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    container_name: umip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: umip_admin
      POSTGRES_PASSWORD: umip_password
      POSTGRES_DB: umip_platform
    ports:
      - "5432:5432"
    volumes:
      - umip_pg_data:/var/lib/postgresql/data
      - ./scripts/airflow_db_init.sql:/docker-entrypoint-initdb.d/1_airflow_db_init.sql:ro
      - ./db_setup.sql:/docker-entrypoint-initdb.d/2_db_setup.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umip_admin -d umip_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: umip_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@umip.local
      PGADMIN_DEFAULT_PASSWORD: admin_password
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - umip_pgadmin_data:/var/lib/pgadmin

  # One-shot: creates the Airflow metadata schema + a default admin user
  # (airflow/airflow), then exits. Run once before the webserver/scheduler:
  #   docker compose up airflow-init
  airflow-init:
    <<: *airflow-common
    container_name: umip_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username airflow --password airflow \
          --firstname Data --lastname Engineer \
          --role Admin --email admin@umip.local || true

  airflow-webserver:
    <<: *airflow-common
    container_name: umip_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    container_name: umip_airflow_scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  umip_pg_data:
  umip_pgadmin_data:
  airflow_logs:
